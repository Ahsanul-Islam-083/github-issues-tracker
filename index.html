<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind & DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- GoogleFont -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <title>Login | GitHub Issue Tracker</title>
    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <header>
        <div class="hero bg-base-200 min-h-screen">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
                <div class="card-body">
                    <div class="mx-auto text-center">
                        <div class="w-full"><img class=" mx-auto" src="./assets/github-logo.png" alt=""></div>
                        <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                        <p class="text-gray-400">Sign in to manage your issues</p>
                    </div>
                    <fieldset class="fieldset">
                        <label class="label font-medium text-neutral-950">Username</label>
                        <input id="userNameInput" type="text" class="input" placeholder="Enter Username" />
                        <div><a class="link link-hover text-primary">Default: admin</a></div>
                        <label class="label font-medium text-neutral-950">Password</label>
                        <input id="passInput" type="password" class="input" placeholder="Enter Password" />
                        <div><a class="link link-hover text-primary">Default: admin123</a></div>
                        <button id="loginBtn" class="btn btn-primary mt-4">Login</button>
                    </fieldset>
                    <div class="divider">OR</div>
                    <div class=" text-center">
                        <p class="text-sm text-gray-400 mb-2">Demo Credentials:</p>
                        <div class="text-sm bg-base-200 py-6 rounded-lg">
                            <p><span class="font-semibold">Username: </span> admin</p>
                            <p><span class="font-semibold">Password:</span> admin123</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
        </div>
    </header>

    <script src="./script/script.js"></script>
</body>

</html>
